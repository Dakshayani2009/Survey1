<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/HTML/Survey.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>Survey Form Example</h1>
    <form id="form">
      <div class="form-control">
        <label for="Name" id="lable name">Name</label>
        <input type="text" id="name" placeholder="Enter your name" />
      </div>

      <div class="form form-control">
        <label for="email" id="lable-email">Email</label>
        <input type="email" id="email" placeholder="Enter your mail" />
      </div>

      <div class="form-control">
        <label for="age" id="lable-age">Age</label>
        <input type="text" id="age" placeholder="Enter your age" />
      </div>

      <div class="form-control">
        <label for="role" id="lable-role"
          >Which option best describe you?</label
        >
        <section name="role" id="role">
          <option value="Student">Student</option>
          <option value="intern">intern</option>
          <option value="professional">Professional</option>
          <option value="other">other</option>
        </section>
      </div>

      <div class="form-control">
        <label>Would you recommended tap Academy to your friend?</label>
        <label for="recommend">
          <input type="radio" id="recommed-1" />Yes
        </label>
        <label for="recommend-2">
          <input type="radio" id="recommend-2" />No
        </label>
        <label for="recommend-3">
          <input type="radio" id="recommend-3" />May be
        </label>
      </div>
      <div class="form-control">
        <label
          >Languages and Frameworks known
          <small>(Check all That apply)</small> </label
        ><br />
        <label for="inp-1">
          <input type="checkbox" name="inp" />Java fullstack</label
        ><br />
        <label for="inp-2">
          <input type="checkbox" name="inp" />Web Development </label
        ><br />
        <label for="inp-3"> <input type="checkbox" name="inp" />python </label
        ><br />
        <div class="form-control">
          <label for="comment">Any comments or suggestions</label>
          <textarea
            name="comment"
            id="comment"
            placeholder="Enter your comment here "
          >
          </textarea>
        </div>

        <button type="submit" value="submit">submit</button>
      </div>
    </form>
  </body>
</html>
